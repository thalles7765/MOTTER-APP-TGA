<ion-app>
  <ion-split-pane contentId="menuOpt">
    <ion-menu contentId="menuOpt" type="overlay">
      <ion-content>
        <ion-list id="inbox-list">
          <div class="d-flex flex-row p-2 gap-2 align-items-center">
            <img
              [src]="brand.assets.menuLogo"
              style="
                border-radius: 10px;
                border-radius: 50%;
                border-style: 2px solid #fff;
              "
              height="60px"
              alt=""
            />

            <div class="d-flex flex-column p-1">
              <p class="mb-0">Olá,</p>
              <h3 class="m-0 fw-bold">{{ brand.companyName }}</h3>
            </div>
          </div>
          <!-- <ion-list-header>Olá,</ion-list-header>
          <ion-note>Thalles Henrique</ion-note> -->

          <!-- <p>teste</p> -->
          <!-- *ngFor="let p of appPages; let i = index" -->

          @for (p of visibleAppPages; track $index) {
            <ion-item
            routerDirection="root"
            [routerLink]="p.url"
            lines="none"
            detail="false"
            routerLinkActive="selected"
            (click)="logout(p)"
          >
            <ion-icon
              aria-hidden="true"
              slot="start"
              [ios]="p.icon + '-outline'"
              [md]="p.icon + '-sharp'"
            ></ion-icon>
            <ion-label>{{p.title}}</ion-label>
          </ion-item>
          }
         
        </ion-list>

        <div
          class="d-flex flex-row w-100 p-2 overflow-hidden align-items-center justify-content-center"
        >
          <img [src]="brand.assets.favicon" alt="" />
        </div>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="menuOpt"></ion-router-outlet>
  </ion-split-pane>

  @if (isAdmin && pendingSecurityRequests > 0) {
    <button
      type="button"
      class="d-inline-flex align-items-center gap-2 position-fixed border-0 text-white fw-bold"
      style="right: 12px; bottom: 12px; z-index: 10000; padding: 0.5rem 0.7rem; border-radius: 999px; background: linear-gradient(135deg, var(--ion-color-primary), var(--ion-color-secondary));"
      (click)="openSecurityRequests()"
    >
      <span class="d-grid bg-white" style="place-items: center; min-width: 1.35rem; height: 1.35rem; border-radius: 999px; color: var(--ion-color-primary);">
        {{ pendingSecurityRequests }}
      </span>
      Liberações pendentes
    </button>
  }
</ion-app>
