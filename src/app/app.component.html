<ion-app>
  <ion-split-pane contentId="menuOpt">
    <ion-menu contentId="menuOpt" type="overlay" class="app-menu">
      <ion-content>
        <section class="menu-hero">
          <span class="menu-logo-ring">
            <img [src]="brand.assets.menuLogo" alt="" />
          </span>
          <div class="menu-identity">
            <small>Ola{{ currentUserName ? ',' : '' }}</small>
            <h2>{{ currentUserName || 'Usuario' }}</h2>
            <!-- <p>{{ brand.companyName }}</p> -->
          </div>
        </section>

        <ion-list id="inbox-list" class="menu-list">
          @for (p of visibleAppPages; track $index) {
            <ion-menu-toggle auto-hide="true">
              <ion-item
                routerDirection="root"
                [routerLink]="p.url === '/app/login' ? null : p.url"
                lines="none"
                detail="false"
                routerLinkActive="selected"
                [class.logout-item]="p.url === '/app/login'"
                (click)="handleMenuClick(p)"
              >
                <ion-icon
                  aria-hidden="true"
                  slot="start"
                  [ios]="p.icon + '-outline'"
                  [md]="p.icon + '-sharp'"
                ></ion-icon>
                <ion-label>{{ p.title }}</ion-label>
              </ion-item>
            </ion-menu-toggle>
          }
        </ion-list>

        <div class="menu-footer">
          <img [src]="brand.assets.favicon" alt="" />
          <span>{{ brand.website || brand.companyName }}</span>
        </div>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="menuOpt"></ion-router-outlet>
  </ion-split-pane>

  @if (isAdmin && pendingSecurityRequests > 0) {
    <button
      type="button"
      class="d-inline-flex align-items-center gap-2 position-fixed border-0 text-white fw-bold"
      style="right: 12px; bottom: 12px; z-index: 10000; padding: 0.5rem 0.7rem; border-radius: 999px; background: linear-gradient(135deg, var(--ion-color-primary), var(--ion-color-secondary));"
      (click)="openSecurityRequests()"
    >
      <span class="d-grid bg-white" style="place-items: center; min-width: 1.35rem; height: 1.35rem; border-radius: 999px; color: var(--ion-color-primary);">
        {{ pendingSecurityRequests }}
      </span>
      Liberacoes pendentes
    </button>
  }
</ion-app>
