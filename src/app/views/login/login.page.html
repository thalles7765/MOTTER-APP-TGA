<ion-content [fullscreen]="true" class="login-content">
  <main class="login-shell">
    <section class="login-hero">
      <span class="logo-orbit">
        <img [src]="brand.assets.logo" alt="" />
      </span>
      <p>Bem-vindo</p>
      <!-- <h1>{{ brand.companyName }}</h1> -->
    </section>

    <form (ngSubmit)="login(credentials)" [formGroup]="credentials" class="login-card">
      <div class="input-stack">
        <ion-item>
          <ion-icon aria-hidden="true" name="person" slot="start"></ion-icon>
          <ion-input
            oninput="this.value = this.value.toUpperCase()"
            label="Usuario"
            labelPlacement="floating"
            placeholder="Usuario"
            formControlName="username"
          ></ion-input>
        </ion-item>

        <ion-item>
          <ion-icon aria-hidden="true" name="key" slot="start"></ion-icon>
          <ion-input
            label="Senha"
            labelPlacement="floating"
            type="password"
            placeholder="Senha"
            formControlName="password"
          >
            <ion-input-password-toggle color="primary" slot="end"></ion-input-password-toggle>
          </ion-input>
        </ion-item>
      </div>

      <ion-button type="submit" expand="block" class="login-button" [disabled]="!credentials.valid">
        Acessar
      </ion-button>

      <button type="button" class="save-access" (click)="setDataStorage()">
        Salvar acesso neste dispositivo
      </button>
    </form>

    @if (brand.website) {
      <footer class="login-site">
        <span>Acesse nosso site</span>
        <strong>{{ brand.website }}</strong>
      </footer>
    }
  </main>
</ion-content>
